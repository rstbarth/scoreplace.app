<script>
// ─── Framework ────────────────────────────────────────────────────────────────
var _tests = [], _suite = '';
function describe(name, fn) { _suite = name; fn(); _suite = ''; }
function it(name, fn)      { _tests.push({ suite: _suite, name, fn, async: false }); }
function itAsync(name, fn) { _tests.push({ suite: _suite, name, fn, async: true  }); }
function expect(val) {
  return {
    toBe:    function(e) { if (val !== e) throw new Error('Expected ' + JSON.stringify(e) + ' got ' + JSON.stringify(val)); },
    toBeTruthy:  function() { if (!val) throw new Error('Expected truthy, got ' + JSON.stringify(val)); },
    toBeFalsy:   function() { if (val)  throw new Error('Expected falsy, got '  + JSON.stringify(val)); },
    toBeGreaterThan: function(e) { if (!(val > e)) throw new Error(val + ' not > ' + e); },
    toEqual: function(e) { if (JSON.stringify(val) !== JSON.stringify(e)) throw new Error('Expected ' + JSON.stringify(e) + ' got ' + JSON.stringify(val)); },
  };
}

// ─── Stubs mínimos ────────────────────────────────────────────────────────────
window._t = function(k, v) {
  if (!v) return k;
  return k.replace(/\{(\w+)\}/g, function(_, p) { return v[p] !== undefined ? v[p] : '{' + p + '}'; });
};
window.AppStore = {
  tournaments: [],
  currentUser: { email: 'org@test.com', uid: 'uid1', displayName: 'Org' },
  isOrganizer: function() { return true; },
  logAction: function() {},
  syncImmediate: function() { return Promise.resolve(); },
  sync: function() {},
  _saveToCache: function() {}, _loadFromCache: function() {},
  getVisibleTournaments: function() { return this.tournaments; },
  getMyOrganized: function() { return this.tournaments; },
  addTournament: function(t) { this.tournaments.push(t); return t; }
};
window.FirestoreDB = { saveTournament: function(t) { return Promise.resolve(t); } };
window.showNotification = function() {};
window.showAlertDialog   = function() {};
window.showConfirmDialog = function() {};
window.showBanner        = function() {};
window.openModal = window.closeModal = window.initRouter = function() {};
window.scrollTo = function() {};
window.matchMedia = function() { return { matches: false, addEventListener: function() {} }; };
if (typeof firebase === 'undefined') window.firebase = { auth: function() { return { onAuthStateChanged: function() {}, currentUser: null }; }, initializeApp: function() {} };
// Serão substituídos por teste:
window.generateDrawFunction    = function() {};
window.showFinalReviewPanel    = function() {};
window._updateStatBoxes        = function() {};
// Stubs para bracket-ui.js
window._rerenderBracket        = function() {};
window.renderParticipants      = function() {};
// Definição real (de tournaments-utils.js) — necessária para suite 3
window._isLigaFormat = window._isLigaFormat || function(t) {
  return t && (t.format === 'Liga' || t.format === 'Ranking');
};
</script>

<script>
function loadScript(src) {
  try {
    var r = new XMLHttpRequest(); r.open('GET', src, false); r.send();
    if (r.status === 200) { try { eval(r.responseText); _loadLog.push({src, ok: true}); } catch(e) { _loadLog.push({src, ok: false, error: e.message}); } }
    else _loadLog.push({src, ok: false, error: 'HTTP ' + r.status});
  } catch(e) { _loadLog.push({src, ok: false, error: e.message}); }
}
var _loadLog = [];
var _origErr = console.error;
console.error = function() { _origErr.apply(console, ['[sup]'].concat(Array.from(arguments))); };
loadScript('js/i18n.js');
loadScript('js/i18n-pt.js');
loadScript('js/i18n-en.js');
loadScript('js/store.js');
loadScript('js/views/bracket-logic.js');
loadScript('js/views/bracket-model.js');
loadScript('js/views/tournaments-draw-prep.js');
loadScript('js/views/bracket-ui.js');
console.error = _origErr;
</script>

<script>
// ─── Helpers ──────────────────────────────────────────────────────────────────
function makeT(n, opts) {
  opts = opts || {};
  var teamSize = opts.teamSize || 1;
  var t = {
    id: 'T' + Date.now() + Math.random().toFixed(8).slice(2),
    name: 'Teste', format: opts.format || 'Eliminatórias', teamSize: teamSize,
    enrollmentMode: teamSize > 1 ? 'time' : 'individual',
    participants: Array.from({length: n}, function(_, i) { return 'J' + (i+1); }),
    waitlist: [], standbyParticipants: [], status: 'open',
    checkedIn: {}, absent: {}
  };
  window.AppStore.tournaments = [t];
  return t;
}

function isPow2(n) { return n > 0 && (n & (n-1)) === 0; }
function lowerPow2(n) { var p = 1; while (p*2 <= n) p *= 2; return p; }

// Espera os microtasks/then() terminarem
function settle() { return new Promise(function(r) { setTimeout(r, 40); }); }

// Configura mocks por teste e retorna cleanup
function mockDraw() {
  var called = 0, panelCalled = 0;
  window.generateDrawFunction    = function() { called++; };
  window.showFinalReviewPanel    = function() { called++; }; // Swiss/Liga usa este
  window.showUnifiedResolutionPanel = null; // detecta se foi chamado indevidamente
  return {
    drawCount:  function() { return called; },
    panelCount: function() { return panelCalled; }
  };
}

// Configura mocks para 2-step (remainder → panel → excesso → draw)
function mockDraw2Step(tId, mode, method) {
  var called = 0;
  window.generateDrawFunction = function() { called++; };
  window.showFinalReviewPanel = function() { called++; };
  window.showUnifiedResolutionPanel = function(id) {
    // simula o usuário clicando Lista de Espera → mesmo método no 2º passo
    window.showUnifiedResolutionPanel = function() {}; // evita loop
    window._executeRemoval(id, mode, method);
  };
  return { drawCount: function() { return called; } };
}

// ════════════════════════════════════════════════════════════════════════════════
// 1. _diagnoseAll — Individual (teamSize=1)
// ════════════════════════════════════════════════════════════════════════════════
describe('_diagnoseAll — individual', function() {
  [2, 4, 8, 16, 32].forEach(function(n) {
    it(n + ' partic → sem issues (potência de 2)', function() {
      var info = window._diagnoseAll(makeT(n));
      expect(info.hasIssues).toBeFalsy();
      expect(info.isPowerOf2).toBeTruthy();
      expect(info.remainder).toBe(0);
    });
  });

  [3, 5, 6, 7, 9, 10, 11, 12, 13, 15].forEach(function(n) {
    it(n + ' partic → hasIssues, excess=' + (n - lowerPow2(n)), function() {
      var info = window._diagnoseAll(makeT(n));
      expect(info.hasIssues).toBeTruthy();
      expect(info.effectiveTeams).toBe(n);
      expect(info.excessParticipants).toBe(n - lowerPow2(n));
      expect(info.remainder).toBe(0);
    });
  });

  it('excessParticipants = excess × teamSize (teamSize=1)', function() {
    [3,5,6,7].forEach(function(n) {
      var i = window._diagnoseAll(makeT(n));
      expect(i.excessParticipants).toBe(i.excess * 1);
    });
  });
});

// ════════════════════════════════════════════════════════════════════════════════
// 2. _diagnoseAll — Duplas (teamSize=2)
// ════════════════════════════════════════════════════════════════════════════════
describe('_diagnoseAll — duplas (teamSize=2)', function() {
  it('4 → efetivo=2, isPowerOf2, sem issues', function() {
    var i = window._diagnoseAll(makeT(4, {teamSize:2}));
    expect(i.remainder).toBe(0); expect(i.effectiveTeams).toBe(2); expect(i.hasIssues).toBeFalsy();
  });
  it('5 → resto=1, efetivo=2, isPowerOf2 (hasIssues por resto)', function() {
    var i = window._diagnoseAll(makeT(5, {teamSize:2}));
    expect(i.remainder).toBe(1); expect(i.effectiveTeams).toBe(2); expect(i.isPowerOf2).toBeTruthy(); expect(i.hasIssues).toBeTruthy();
  });
  it('6 → sem resto, efetivo=3, excess=1, excessParticipants=2', function() {
    var i = window._diagnoseAll(makeT(6, {teamSize:2}));
    expect(i.remainder).toBe(0); expect(i.effectiveTeams).toBe(3); expect(i.excess).toBe(1); expect(i.excessParticipants).toBe(2);
  });
  it('7 → resto=1, efetivo=3, excessParticipants=2', function() {
    var i = window._diagnoseAll(makeT(7, {teamSize:2}));
    expect(i.remainder).toBe(1); expect(i.effectiveTeams).toBe(3); expect(i.excessParticipants).toBe(2);
  });
  it('8 → sem issues, efetivo=4', function() {
    var i = window._diagnoseAll(makeT(8, {teamSize:2}));
    expect(i.hasIssues).toBeFalsy(); expect(i.effectiveTeams).toBe(4);
  });
  it('excessParticipants = excess × 2 em todos os casos', function() {
    [5,6,7,9,10,11,13].forEach(function(n) {
      var i = window._diagnoseAll(makeT(n, {teamSize:2}));
      expect(i.excessParticipants).toBe(i.excess * 2);
    });
  });
});

// ════════════════════════════════════════════════════════════════════════════════
// 3. _isLigaFormat — garante que Liga e Ranking são tratados iguais
// ════════════════════════════════════════════════════════════════════════════════
describe('_isLigaFormat', function() {
  var f = window._isLigaFormat;
  it('Liga → true',        function() { expect(f({format:'Liga'})).toBeTruthy(); });
  it('Ranking → true',     function() { expect(f({format:'Ranking'})).toBeTruthy(); });
  it('Suíço → false',      function() { expect(f({format:'Suíço Clássico'})).toBeFalsy(); });
  it('Eliminatórias → false', function() { expect(f({format:'Eliminatórias'})).toBeFalsy(); });
  it('Dupla Eliminatória → false', function() { expect(f({format:'Dupla Eliminatória'})).toBeFalsy(); });
  it('formato vazio → false', function() { expect(f({})).toBeFalsy(); });
});

// ════════════════════════════════════════════════════════════════════════════════
// 4. Resolução individual — 1 passo (async, função real)
// Critério: generateDrawFunction chamado exatamente 1×, participants = potência de 2
// ════════════════════════════════════════════════════════════════════════════════
describe('Resolução individual — 1 passo (função real)', function() {
  var counts  = [3, 5, 6, 7, 9, 10, 11, 12, 13, 15];
  var methods = [
    {mode:'standby',   method:'random', label:'Espera/Sorteio'},
    {mode:'standby',   method:'last',   label:'Espera/Últimos'},
    {mode:'exclusion', method:'random', label:'Exclusão/Sorteio'},
    {mode:'exclusion', method:'last',   label:'Exclusão/Últimos'},
  ];

  counts.forEach(function(n) {
    methods.forEach(function(m) {
      itAsync(n + ' partic + ' + m.label + ' → draw 1×, resultado=' + lowerPow2(n), async function() {
        var t = makeT(n);
        var spy = mockDraw();
        window.showUnifiedResolutionPanel = function() {
          throw new Error('showUnifiedResolutionPanel chamado indevidamente após resolução!');
        };

        window._executeRemoval(t.id, m.mode, m.method);
        await settle();

        if (spy.drawCount() !== 1) throw new Error(
          'generateDrawFunction chamado ' + spy.drawCount() + '× (esperado 1). ' +
          'Partic restantes: ' + t.participants.length
        );
        expect(isPow2(t.participants.length)).toBeTruthy();
        expect(t.participants.length).toBe(lowerPow2(n));
      });
    });
  });
});

// ════════════════════════════════════════════════════════════════════════════════
// 5. Resolução duplas — 1 passo (sem resto, só excesso de potência de 2)
// ════════════════════════════════════════════════════════════════════════════════
describe('Resolução duplas — 1 passo (sem resto)', function() {
  // 6 partic: efetivo=3, excess=1, excessParticipants=2 → remove 2 → efetivo=2 ✓
  // 10 partic: efetivo=5, excess=1, excessParticipants=2 → remove 2 → efetivo=4... wait
  // 10 partic, teamSize=2: efetivo=5, loP2=4, excess=1, excessParticipants=2 → remove 2 → 8 partic, efetivo=4 ✓
  var cases = [
    {n: 6,  expected: 4},   // efetivo 3 → 2
    {n: 10, expected: 8},   // efetivo 5 → 4
  ];
  var methods = [
    {mode:'standby',   method:'random', label:'Espera/Sorteio'},
    {mode:'standby',   method:'last',   label:'Espera/Últimos'},
    {mode:'exclusion', method:'random', label:'Exclusão/Sorteio'},
    {mode:'exclusion', method:'last',   label:'Exclusão/Últimos'},
  ];

  cases.forEach(function(c) {
    methods.forEach(function(m) {
      itAsync(c.n + ' duplas + ' + m.label + ' → ' + c.expected + ' partic, draw 1×', async function() {
        var t = makeT(c.n, {teamSize: 2});
        var spy = mockDraw();
        window.showUnifiedResolutionPanel = function() {
          throw new Error('panel chamado — ainda hasIssues após remoção!');
        };

        window._executeRemoval(t.id, m.mode, m.method);
        await settle();

        if (spy.drawCount() !== 1) throw new Error(
          'draw chamado ' + spy.drawCount() + '×. Partic: ' + t.participants.length
        );
        expect(t.participants.length).toBe(c.expected);
        expect(isPow2(t.participants.length / 2)).toBeTruthy(); // efetivo = pow2
      });
    });
  });
});

// ════════════════════════════════════════════════════════════════════════════════
// 6. Resolução duplas — 2 passos (com resto + excesso de potência de 2)
// Passo 1 (resto): showUnifiedResolutionPanel é chamado (correto)
// Passo 2 (excesso): draw é chamado (não deve voltar ao painel)
// ════════════════════════════════════════════════════════════════════════════════
describe('Resolução duplas — 2 passos (resto + excesso)', function() {
  // 7 partic: resto=1 → 6 → efetivo=3 → excesso=2 → 4 partic, efetivo=2
  // 11 partic: resto=1 → 10 → efetivo=5 → excesso=2 → 8 partic, efetivo=4
  // 13 partic: resto=1 → 12 → efetivo=6 → excesso=4 → 8 partic, efetivo=4
  var cases = [
    {n: 7,  expected: 4},
    {n: 11, expected: 8},
    {n: 13, expected: 8},
  ];
  var methods = [
    {mode:'standby',   method:'random', label:'Espera/Sorteio'},
    {mode:'standby',   method:'last',   label:'Espera/Últimos'},
    {mode:'exclusion', method:'random', label:'Exclusão/Sorteio'},
    {mode:'exclusion', method:'last',   label:'Exclusão/Últimos'},
  ];

  cases.forEach(function(c) {
    methods.forEach(function(m) {
      itAsync(c.n + ' duplas + ' + m.label + ' (2 passos) → ' + c.expected + ' partic, draw 1×', async function() {
        var t = makeT(c.n, {teamSize: 2});
        var spy = mockDraw2Step(t.id, m.mode, m.method);

        window._executeRemoval(t.id, m.mode, m.method);
        await settle();
        await settle(); // segundo then

        if (spy.drawCount() !== 1) throw new Error(
          'draw chamado ' + spy.drawCount() + '× (esperado 1). Partic: ' + t.participants.length
        );
        expect(t.participants.length).toBe(c.expected);
        var efetivo = t.participants.length / 2;
        expect(isPow2(efetivo)).toBeTruthy();
      });
    });
  });
});

// ════════════════════════════════════════════════════════════════════════════════
// 7. Integridade de dados após resolução
// ════════════════════════════════════════════════════════════════════════════════
describe('Integridade de dados após resolução', function() {
  var counts = [5, 6, 7, 9, 10, 11, 13];

  itAsync('standby: total = participantes + waitlist (nada se perde)', async function() {
    for (var i = 0; i < counts.length; i++) {
      var n = counts[i];
      var t = makeT(n, {teamSize:2});
      window.generateDrawFunction = function() {};
      window.showUnifiedResolutionPanel = function(id) {
        window.showUnifiedResolutionPanel = function() {};
        window._executeRemoval(id, 'standby', 'last');
      };
      window._executeRemoval(t.id, 'standby', 'last');
      await settle(); await settle();
      var total = t.participants.length + t.waitlist.length;
      if (total !== n) throw new Error(n + ' duplas standby: total=' + total + ' (esperado ' + n + ')');
    }
  });

  itAsync('exclusão: waitlist permanece vazio', async function() {
    for (var i = 0; i < counts.length; i++) {
      var n = counts[i];
      var t = makeT(n, {teamSize:2});
      window.generateDrawFunction = function() {};
      window.showUnifiedResolutionPanel = function(id) {
        window.showUnifiedResolutionPanel = function() {};
        window._executeRemoval(id, 'exclusion', 'last');
      };
      window._executeRemoval(t.id, 'exclusion', 'last');
      await settle(); await settle();
      if (t.waitlist.length !== 0) throw new Error(n + ' duplas exclusão: waitlist tem ' + t.waitlist.length + ' entradas');
    }
  });

  itAsync('"last" remove os últimos inscritos (individual)', async function() {
    var n = 6;
    var t = makeT(n); // J1..J6, remove 2 → J5 e J6 no waitlist
    window.generateDrawFunction = function() {};
    window.showUnifiedResolutionPanel = function() {};
    window._executeRemoval(t.id, 'standby', 'last');
    await settle();
    var wl = t.waitlist.map(function(p) { return typeof p === 'string' ? p : (p.name || p.displayName); });
    if (wl.indexOf('J5') === -1 || wl.indexOf('J6') === -1) {
      throw new Error('"last" não removeu os últimos. Waitlist: ' + JSON.stringify(wl));
    }
  });

  itAsync('status = closed após resolução', async function() {
    var t = makeT(6, {teamSize:2});
    window.generateDrawFunction = function() {};
    window.showUnifiedResolutionPanel = function() {};
    window._executeRemoval(t.id, 'standby', 'random');
    await settle();
    expect(t.status).toBe('closed');
  });

  itAsync('individual: participants.length = lowerPow2(n) após resolução', async function() {
    var counts2 = [3, 5, 6, 7, 9, 10, 11, 12, 13, 15];
    for (var i = 0; i < counts2.length; i++) {
      var n = counts2[i];
      var t = makeT(n);
      window.generateDrawFunction = function() {};
      window.showUnifiedResolutionPanel = function() {};
      window._executeRemoval(t.id, 'exclusion', 'last');
      await settle();
      if (t.participants.length !== lowerPow2(n)) {
        throw new Error(n + ' partic: esperado ' + lowerPow2(n) + ', got ' + t.participants.length);
      }
    }
  });
});

// ════════════════════════════════════════════════════════════════════════════════
// 8. _computeStandings — Liga (pontuação, ordenação, empates)
// ════════════════════════════════════════════════════════════════════════════════
describe('_computeStandings — Liga', function() {
  function makeRound(matches) {
    return { matches: matches };
  }
  function match(p1, p2, s1, s2, winner) {
    return { id: Math.random().toFixed(8), p1: p1, p2: p2, score1: s1, score2: s2, winner: winner };
  }
  function standings(t) {
    return window._computeStandings(t);
  }

  it('vitória = 3pts, derrota = 0pts', function() {
    var t = {
      format: 'Liga', enrollmentMode: 'individual', teamSize: 1,
      rounds: [makeRound([match('A','B',6,3,'A')])],
      participants: ['A','B'], checkedIn: {}, absent: {}
    };
    var s = standings(t);
    var a = s.find(function(x) { return x.name === 'A'; });
    var b = s.find(function(x) { return x.name === 'B'; });
    expect(a.points).toBe(3);
    expect(b.points).toBe(0);
    expect(a.wins).toBe(1);
    expect(b.losses).toBe(1);
  });

  it('empate = 1pt cada', function() {
    var t = {
      format: 'Liga', enrollmentMode: 'individual', teamSize: 1,
      rounds: [makeRound([match('A','B',5,5,'draw')])],
      participants: ['A','B'], checkedIn: {}, absent: {}
    };
    var s = standings(t);
    var a = s.find(function(x) { return x.name === 'A'; });
    var b = s.find(function(x) { return x.name === 'B'; });
    expect(a.points).toBe(1);
    expect(b.points).toBe(1);
    expect(a.draws).toBe(1);
    expect(b.draws).toBe(1);
  });

  it('ordenação: mais pontos primeiro', function() {
    var t = {
      format: 'Liga', enrollmentMode: 'individual', teamSize: 1,
      rounds: [makeRound([
        match('A','B',6,3,'A'),
        match('C','D',6,3,'C')
      ]), makeRound([
        match('A','C',6,3,'A'),
        match('B','D',6,3,'B')
      ])],
      participants: ['A','B','C','D'], checkedIn: {}, absent: {}
    };
    var s = standings(t);
    // A: 2 wins = 6pts; B: 1 win = 3pts; C: 1 win = 3pts; D: 0pts
    expect(s[0].name).toBe('A');
    expect(s[0].points).toBe(6);
    expect(s[3].points).toBe(0);
  });

  it('partidas sem resultado não contam', function() {
    var t = {
      format: 'Liga', enrollmentMode: 'individual', teamSize: 1,
      rounds: [makeRound([{ id:'m1', p1:'A', p2:'B', score1:null, score2:null }])],
      participants: ['A','B'], checkedIn: {}, absent: {}
    };
    var s = standings(t);
    var a = s.find(function(x) { return x.name === 'A'; });
    expect(a.points).toBe(0);
    expect(a.wins).toBe(0);
  });

  it('múltiplas rodadas acumulam corretamente', function() {
    var t = {
      format: 'Liga', enrollmentMode: 'individual', teamSize: 1,
      rounds: [
        makeRound([match('A','B',6,3,'A')]),
        makeRound([match('A','B',5,5,'draw')]),
        makeRound([match('A','B',3,6,'B')]),
      ],
      participants: ['A','B'], checkedIn: {}, absent: {}
    };
    var s = standings(t);
    var a = s.find(function(x) { return x.name === 'A'; });
    // A: 1W(3) + 1D(1) + 1L(0) = 4pts
    expect(a.points).toBe(4);
    expect(a.wins).toBe(1);
    expect(a.draws).toBe(1);
    expect(a.losses).toBe(1);
  });
});

// ════════════════════════════════════════════════════════════════════════════════
// 10. Lista de Espera — substituição W.O. e ordenação (first come, first serve)
// Cobre a descrição do usuário:
//  - Botão "Preencher" único no topo (não por item)
//  - Clicado → primeiro presente na lista preenche a 1ª vaga W.O.
//  - Ordenação por timestamp de check-in (primeiro chegou = topo da lista)
// ════════════════════════════════════════════════════════════════════════════════
describe('Lista de Espera — W.O. e ordem de chegada', function() {

  // Tournament com um W.O. em um match da chave
  function makeWOT(opts) {
    opts = opts || {};
    var standby = opts.standby || [];
    var t = {
      id: 'TWO' + Date.now() + Math.random().toFixed(8).slice(2),
      name: 'WO Test', format: 'Eliminatórias', teamSize: 1,
      enrollmentMode: 'individual', tournamentStarted: true,
      matches: [
        { id: 'mWO', p1: 'Ausente', p2: 'OpponentA', score1: null, score2: null }
      ],
      participants: ['Ausente', 'OpponentA'].concat(standby),
      waitlist: standby.slice(),
      standbyParticipants: [],
      checkedIn: opts.checkedIn || {},
      absent: opts.absent !== undefined ? opts.absent : { 'Ausente': true },
      status: 'active', woScope: 'individual'
    };
    window.AppStore.tournaments = [t];
    return t;
  }

  // Faz showConfirmDialog chamar o callback imediatamente (simula usuário confirmar)
  function confirmImmediate() {
    var orig = window.showConfirmDialog;
    window.showConfirmDialog = function(title, body, onConfirm) { if (typeof onConfirm === 'function') onConfirm(); };
    return function() { window.showConfirmDialog = orig; };
  }

  // Helper: mesma lógica de ordenação que _renderStandbyPanel usa
  function sortStandby(list, ci) {
    var ci2 = ci || {};
    var getName = function(p) { return typeof p === 'string' ? p : (p.displayName || p.name || ''); };
    return list.slice().sort(function(a, b) {
      var na = getName(a), nb = getName(b);
      var tsa = ci2[na], tsb = ci2[nb];
      if (tsa && tsb) return tsa - tsb;
      if (tsa) return -1;
      if (tsb) return 1;
      return 0;
    });
  }

  // ── Casos sem substituição ────────────────────────────────────────────────────

  it('sem W.O. na chave → não substitui (notificação emitida)', function() {
    var t = makeWOT({ standby: ['S1'], checkedIn: { 'S1': Date.now() }, absent: {} });
    var notifCalled = false;
    var origN = window.showNotification;
    window.showNotification = function() { notifCalled = true; };
    window._autoSubstituteWO(t.id, null);
    window.showNotification = origN;
    expect(notifCalled).toBeTruthy();
    expect(t.matches[0].p1).toBe('Ausente'); // inalterado (nenhum W.O. foi detectado)
  });

  it('W.O. existe + ninguém fez check-in → não substitui', function() {
    var t = makeWOT({ standby: ['S1', 'S2'], checkedIn: {} });
    var notifCalled = false;
    var origN = window.showNotification;
    window.showNotification = function() { notifCalled = true; };
    window._autoSubstituteWO(t.id, null);
    window.showNotification = origN;
    expect(notifCalled).toBeTruthy();
    expect(t.matches[0].p1).toBe('Ausente');
  });

  it('substituto específico solicitado mas NÃO presente → não substitui', function() {
    var t = makeWOT({ standby: ['S1'], checkedIn: {} }); // S1 não fez check-in
    var notifCalled = false;
    var origN = window.showNotification;
    window.showNotification = function() { notifCalled = true; };
    window._autoSubstituteWO(t.id, 'S1');
    window.showNotification = origN;
    expect(notifCalled).toBeTruthy();
    expect(t.matches[0].p1).toBe('Ausente');
  });

  // ── Substituição bem-sucedida ─────────────────────────────────────────────────

  it('W.O. + primeiro presente → substitui o jogador ausente no match', function() {
    var t = makeWOT({ standby: ['S1', 'S2'], checkedIn: { 'S1': Date.now() } });
    var restore = confirmImmediate();
    window._autoSubstituteWO(t.id, null);
    restore();
    expect(t.matches[0].p1).toBe('S1');
  });

  it('após substituição: S1 removido da waitlist', function() {
    var t = makeWOT({ standby: ['S1', 'S2'], checkedIn: { 'S1': Date.now() } });
    var restore = confirmImmediate();
    window._autoSubstituteWO(t.id, null);
    restore();
    var wl = (t.waitlist || []).map(function(p) { return typeof p === 'string' ? p : (p.displayName || p.name || ''); });
    expect(wl.indexOf('S1')).toBe(-1);
  });

  it('após substituição: absent do W.O. limpo + substituto marcado presente', function() {
    var t = makeWOT({ standby: ['S1'], checkedIn: { 'S1': Date.now() } });
    var restore = confirmImmediate();
    window._autoSubstituteWO(t.id, null);
    restore();
    expect(!!t.absent['Ausente']).toBeFalsy();
    expect(!!t.checkedIn['S1']).toBeTruthy();
  });

  it('substituto específico presente + override → usa esse nome', function() {
    var now = Date.now();
    var t = makeWOT({ standby: ['S1', 'S2'], checkedIn: { 'S1': now, 'S2': now + 1 } });
    var restore = confirmImmediate();
    window._autoSubstituteWO(t.id, 'S2'); // força S2 mesmo S1 estando presente
    restore();
    expect(t.matches[0].p1).toBe('S2');
  });

  // ── Ordenação first-come-first-serve ─────────────────────────────────────────

  it('menor timestamp = topo da lista (FCFS sort)', function() {
    var now = Date.now();
    var ci = { 'S3': now - 300, 'S1': now - 100 }; // S3 chegou antes; S2 sem check-in
    var sorted = sortStandby(['S1', 'S2', 'S3'], ci);
    expect(sorted[0]).toBe('S3'); // chegou primeiro
    expect(sorted[1]).toBe('S1'); // chegou depois
    expect(sorted[2]).toBe('S2'); // sem check-in = último
  });

  it('todos sem check-in: preserva ordem de inserção', function() {
    var sorted = sortStandby(['S1', 'S2', 'S3'], {});
    expect(sorted[0]).toBe('S1');
    expect(sorted[1]).toBe('S2');
    expect(sorted[2]).toBe('S3');
  });

  it('FCFS end-to-end: botão Preencher usa primeiro da fila por timestamp', function() {
    // _renderStandbyPanel ordena e passa firstPresentName ao _autoSubstituteWO
    // Aqui simulamos esse fluxo: sort → find first present → call _autoSubstituteWO
    var now = Date.now();
    var t = makeWOT({
      standby: ['LateArrival', 'EarlyArrival'], // EarlyArrival tem timestamp menor
      checkedIn: { 'LateArrival': now, 'EarlyArrival': now - 500 }
    });
    // Simula _renderStandbyPanel: sort + find first present
    var getName = function(p) { return typeof p === 'string' ? p : (p.displayName || p.name || ''); };
    var ci = t.checkedIn;
    var sorted = sortStandby(t.waitlist, ci);
    var firstPresent = sorted.find(function(p) { return !!ci[getName(p)] && !((t.absent || {})[getName(p)]); });
    var firstName = getName(firstPresent);
    // EarlyArrival deve ser o primeiro (timestamp menor)
    expect(firstName).toBe('EarlyArrival');
    // Botão passa esse nome → _autoSubstituteWO usa exatamente EarlyArrival
    var restore = confirmImmediate();
    window._autoSubstituteWO(t.id, firstName);
    restore();
    expect(t.matches[0].p1).toBe('EarlyArrival');
  });

  it('S2 passa na frente de S1 se S2 fez check-in primeiro', function() {
    var now = Date.now();
    var standby = ['S1', 'S2']; // S1 inscreveu primeiro, mas S2 chegou antes
    var ci = { 'S2': now - 400, 'S1': now - 100 };
    var sorted = sortStandby(standby, ci);
    expect(sorted[0]).toBe('S2'); // chegou primeiro = topo da lista
  });
});

// ════════════════════════════════════════════════════════════════════════════════
// RUNNER
// ════════════════════════════════════════════════════════════════════════════════
(async function run() {
  var results = [];
  for (var i = 0; i < _tests.length; i++) {
    var t = _tests[i];
    try {
      if (t.async) { await t.fn(); } else { t.fn(); }
      results.push({suite: t.suite, name: t.name, pass: true});
    } catch(e) {
      results.push({suite: t.suite, name: t.name, pass: false, error: e.message});
    }
  }

  // Load status
  document.getElementById('load-status').innerHTML = _loadLog.map(function(l) {
    return '<span style="margin-right:8px;color:' + (l.ok ? '#4ade80' : '#f87171') + '">' +
      (l.ok ? '✓' : '✗') + ' ' + l.src.split('/').pop() + (l.ok ? '' : ': ' + l.error) + '</span>';
  }).join('');

  var passed = results.filter(function(r) { return r.pass; }).length;
  var failed = results.filter(function(r) { return !r.pass; }).length;

  document.getElementById('summary').innerHTML =
    '<span class="' + (failed === 0 ? 'pass' : 'fail') + '">' +
    (failed === 0
      ? '✓ Todos os ' + passed + ' testes passaram'
      : '✗ ' + failed + ' falha(s), ' + passed + ' passaram') +
    '</span>';

  // Group by suite
  var suites = {}, order = [];
  results.forEach(function(r) {
    if (!suites[r.suite]) { suites[r.suite] = []; order.push(r.suite); }
    suites[r.suite].push(r);
  });

  var html = '';
  order.forEach(function(name) {
    var suite = suites[name];
    var sf = suite.filter(function(r) { return !r.pass; }).length;
    html += '<div class="suite">';
    html += '<h3>' + name + ' <span style="color:' + (sf > 0 ? '#f87171' : '#4ade80') + ';font-size:0.8rem;font-weight:400;">' +
      (suite.length - sf) + '/' + suite.length + '</span></h3>';
    suite.forEach(function(r) {
      html += '<div class="test-row"><span class="icon">' + (r.pass ? '✅' : '❌') + '</span>' +
        '<span class="test-name ' + (r.pass ? 'pass' : 'fail') + '">' + r.name + '</span></div>';
      if (!r.pass && r.error) html += '<div class="error-msg">' + r.error + '</div>';
    });
    html += '</div>';
  });

  document.getElementById('results').innerHTML = html;
})();
</script>
